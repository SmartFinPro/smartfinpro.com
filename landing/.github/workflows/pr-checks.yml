name: PR Checks

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  quality-checks:
    name: Imports + Expert Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check client/server imports
        run: npm run check:imports

      - name: Check expert images
        run: npm run check:experts
