name: Build & Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build on GitHub → Deploy to Cloudways VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js Setup ─────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install Dependencies ───────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build Next.js (4GB RAM auf GitHub Actions) ─────────
      - name: Build Next.js
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=3072"
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GOOGLE_INDEXING_JSON: ${{ secrets.GOOGLE_INDEXING_JSON }}

      # ── 5. Copy static assets into standalone ─────────────────
      - name: Prepare standalone output
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      # ── 5b. Write production .env into standalone ──────────────
      - name: Write production .env
        run: |
          cat > .next/standalone/.env << 'EOF'
          NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          CRON_SECRET=${{ secrets.CRON_SECRET }}
          SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}
          DASHBOARD_SECRET=${{ secrets.DASHBOARD_SECRET }}
          DASHBOARD_TOTP_SECRET=${{ secrets.DASHBOARD_TOTP_SECRET }}
          EOF
          echo "✅ .env written ($(wc -l < .next/standalone/.env) lines)"

      # ── 6. Inject Critical CSS ────────────────────────────────
      - name: Inject Critical CSS
        run: node scripts/inject-critical-css.mjs
        continue-on-error: true

      # ── 7. SSH Key Setup ──────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # ── 8. Rsync standalone → VPS ─────────────────────────────
      - name: Deploy standalone to VPS
        run: |
          rsync -avz --delete --no-perms --no-owner --no-group \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            .next/standalone/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/master/applications/brvnvntpcj/public_html/.next/standalone/ \
          || RSYNC_EXIT=$?; [ "${RSYNC_EXIT:-0}" -eq 23 ] && echo "⚠️ rsync code 23 (minor permission issues) — continuing" || exit ${RSYNC_EXIT:-0}

      # ── 9. PM2 Restart ────────────────────────────────────────
      - name: Restart PM2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "export PM2=/home/master/.npm-global/bin/pm2 && \$PM2 restart SmartFinPro-Live --update-env && \$PM2 save"

      # ── 10. Health Check ──────────────────────────────────────
      - name: Health Check
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "sleep 5 && curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/ | grep -q '200' && echo '✅ Health check passed' || (echo '❌ Health check failed' && exit 1)"
