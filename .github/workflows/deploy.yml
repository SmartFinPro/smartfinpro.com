name: Build & Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build on GitHub → Deploy to Cloudways VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js Setup ─────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install Dependencies ───────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build Next.js (4GB RAM auf GitHub Actions) ─────────
      - name: Build Next.js
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=3072"
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GOOGLE_INDEXING_JSON: ${{ secrets.GOOGLE_INDEXING_JSON }}

      # ── 5. Copy static assets into standalone ─────────────────
      - name: Prepare standalone output
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      # ── 5b. Write production .env into standalone ──────────────
      - name: Write production .env
        run: |
          cat > .next/standalone/.env <<'EOF'
          NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
          CRON_SECRET=${{ secrets.CRON_SECRET }}
          SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}
          DASHBOARD_SECRET=${{ secrets.DASHBOARD_SECRET }}
          DASHBOARD_TOTP_SECRET=${{ secrets.DASHBOARD_TOTP_SECRET }}
          GSC_CLIENT_EMAIL=${{ secrets.GSC_CLIENT_EMAIL }}
          GSC_PRIVATE_KEY=${{ secrets.GSC_PRIVATE_KEY }}
          GSC_SITE_URL=${{ secrets.GSC_SITE_URL }}
          GOOGLE_INDEXING_JSON=${{ secrets.GOOGLE_INDEXING_JSON }}
          RESEND_WEBHOOK_SECRET=${{ secrets.RESEND_WEBHOOK_SECRET }}
          EOF
          sed -i 's/^[[:space:]]*//' .next/standalone/.env
          echo "✅ .env written ($(wc -l < .next/standalone/.env) lines)"

      # ── 6. Inject Critical CSS ────────────────────────────────
      - name: Inject Critical CSS
        run: node scripts/inject-critical-css.mjs
        continue-on-error: true

      # ── 7. SSH Key Setup ──────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # ── 8. Backup current standalone (Self-Healing) ─────────
      - name: Backup current standalone
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /home/master/applications/brvnvntpcj/public_html && \
             rm -rf .next/standalone-backup && \
             if [ -d .next/standalone ]; then \
               cp -a .next/standalone .next/standalone-backup && \
               echo '✅ Backup created'; \
             else \
               echo '⚠️ No existing standalone to backup'; \
             fi"

      # ── 9. Rsync standalone → VPS ─────────────────────────────
      - name: Deploy standalone to VPS
        run: |
          rsync -avz --delete --no-perms --no-owner --no-group \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            .next/standalone/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/master/applications/brvnvntpcj/public_html/.next/standalone/ \
          || RSYNC_EXIT=$?; [ "${RSYNC_EXIT:-0}" -eq 23 ] && echo "⚠️ rsync code 23 (minor permission issues) — continuing" || exit ${RSYNC_EXIT:-0}

      # ── 9b. Sync content directory to VPS ─────────────────────
      # Uses --no-delete: preserves files written by Genesis Hub directly on VPS.
      # New/updated MDX files from git are synced TO VPS. VPS-only Genesis Hub
      # files are never overwritten. This ensures git-committed content reaches
      # APP_ROOT/content/ for dynamic runtime serving (process.cwd()/content/).
      - name: Sync content to VPS
        run: |
          rsync -avz --no-perms --no-owner --no-group \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            content/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/master/applications/brvnvntpcj/public_html/content/ \
          || RSYNC_EXIT=$?; [ "${RSYNC_EXIT:-0}" -eq 23 ] && echo "⚠️ rsync code 23 (minor permission issues) — continuing" || exit ${RSYNC_EXIT:-0}

      # ── 10. PM2 Restart ───────────────────────────────────────
      # ── 10a. Sync runtime env vars to VPS .env.local ─────────
      # PM2 cwd=APP_ROOT → Next.js reads .env.local from app root (not standalone dir).
      # We must keep .env.local in sync for runtime vars that live only on VPS.
      - name: Sync runtime env to VPS .env.local
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "ENV_FILE=/home/master/applications/brvnvntpcj/public_html/.env.local
             STANDALONE_ENV=/home/master/applications/brvnvntpcj/public_html/.next/standalone/.env

             update_env() { local key=\$1 val=\$2
               if grep -q \"^\${key}=\" \"\$ENV_FILE\" 2>/dev/null; then
                 sed -i \"s|^\${key}=.*|\${key}=\${val}|\" \"\$ENV_FILE\"
               else
                 echo \"\${key}=\${val}\" >> \"\$ENV_FILE\"
               fi
             }

             # Sync all runtime vars from standalone .env to .env.local
             # This ensures vars written by Step 5b reach PM2's working directory
             for KEY in GSC_CLIENT_EMAIL GSC_SITE_URL GOOGLE_INDEXING_JSON RESEND_WEBHOOK_SECRET; do
               VAL=\$(grep \"^\${KEY}=\" \"\$STANDALONE_ENV\" 2>/dev/null | head -1 | cut -d= -f2-)
               if [ -n \"\$VAL\" ]; then
                 update_env \"\$KEY\" \"\$VAL\"
               fi
             done

             # GSC_PRIVATE_KEY needs special handling (multiline PEM)
             # Remove old key and copy fresh from standalone .env
             sed -i '/^GSC_PRIVATE_KEY=/d' \"\$ENV_FILE\" 2>/dev/null
             grep '^GSC_PRIVATE_KEY=' \"\$STANDALONE_ENV\" >> \"\$ENV_FILE\" 2>/dev/null

             echo '✅ .env.local synced with all runtime vars'
             grep -c '=' \"\$ENV_FILE\" | xargs -I{} echo '   {} vars in .env.local'"

      - name: Restart PM2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "export PM2=/home/master/.npm-global/bin/pm2 && \$PM2 restart SmartFinPro-Live --update-env && \$PM2 save"

      # ── 11. Health Check (3 Versuche, je 10s) ────────────────
      - name: Health Check
        id: healthcheck
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'for i in 1 2 3; do
              sleep 10
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
              echo "Attempt $i: HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "✅ Health check passed"
                exit 0
              fi
            done
            echo "❌ Health check failed after 3 attempts"
            exit 1'

      # ── 11b. Smoke Test — 15 Critical URLs ───────────────────
      # Gate: failure triggers rollback (same as health check failure).
      # continue-on-error is intentionally NOT set so the outcome is 'failure'.
      - name: Smoke Test
        id: smoketest
        if: steps.healthcheck.outcome == 'success'
        run: node scripts/smoke-test.mjs ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      # ── 11c. Origin Smoke Test — full SEO checks via SSH (bypasses Cloudflare) ──
      # Runs the same smoke-test.mjs against http://localhost:3000 on the VPS.
      # All URLs get FULL checks because there's no CDN bot-challenge at origin.
      # This catches canonical/schema regressions that CDN-basic-tier would miss.
      - name: Origin Smoke Test (via SSH)
        id: origin_smoketest
        if: steps.healthcheck.outcome == 'success'
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'URLS="/us /us/trading /us/ai-tools /us/trading/etoro-review /tools/trading-cost-calculator /affiliate-disclosure"
             FAILED=0
             for path in $URLS; do
               STATUS=$(curl -sf -o /tmp/smoke_body -w "%{http_code}" "http://localhost:3000${path}" 2>/dev/null || echo "000")
               if [ "$STATUS" != "200" ]; then
                 echo "❌ ORIGIN FAIL ${path}: HTTP ${STATUS}"
                 FAILED=$((FAILED+1))
                 continue
               fi
               # Check canonical present
               if ! grep -qi "rel=.canonical." /tmp/smoke_body 2>/dev/null; then
                 echo "⚠️  ORIGIN WARN ${path}: missing canonical tag"
               fi
               # Check no noindex
               if grep -qi "noindex" /tmp/smoke_body 2>/dev/null; then
                 echo "❌ ORIGIN FAIL ${path}: contains noindex"
                 FAILED=$((FAILED+1))
                 continue
               fi
               # Check title present
               if ! grep -qi "<title>" /tmp/smoke_body 2>/dev/null; then
                 echo "❌ ORIGIN FAIL ${path}: missing title"
                 FAILED=$((FAILED+1))
                 continue
               fi
               echo "✅ ORIGIN PASS ${path}"
             done
             rm -f /tmp/smoke_body
             echo "Origin smoke: $FAILED failures out of $(echo $URLS | wc -w) URLs"
             [ "$FAILED" -eq 0 ]'

      # ── 12. Auto-Rollback bei Fehler ─────────────────────────
      # always() ensures this runs even if a prior step crashed (not just 'failure' outcome).
      # Without always(), GitHub Actions skips subsequent steps after an unhandled step error.
      - name: Rollback on failure
        if: ${{ always() && (steps.healthcheck.outcome == 'failure' || steps.smoketest.outcome == 'failure') }}
        run: |
          echo "🔄 Rolling back to previous version..."
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /home/master/applications/brvnvntpcj/public_html && \
             if [ -d .next/standalone-backup ]; then \
               rm -rf .next/standalone && \
               mv .next/standalone-backup .next/standalone && \
               export PM2=/home/master/.npm-global/bin/pm2 && \
               \$PM2 restart SmartFinPro-Live --update-env && \
               \$PM2 save && \
               echo '✅ Rollback complete, PM2 restarted'; \
             else \
               echo '❌ No backup found, cannot rollback'; \
             fi"

      # ── 13. Log failed deploy to dashboard ───────────────────
      - name: Log deploy failure to dashboard
        if: ${{ always() && (steps.healthcheck.outcome == 'failure' || steps.smoketest.outcome == 'failure') }}
        continue-on-error: true
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          CRON_SECRET=$(grep -oP '^CRON_SECRET=\K.*' .next/standalone/.env | tr -d ' ')
          SITE_URL=$(grep -oP '^NEXT_PUBLIC_SITE_URL=\K.*' .next/standalone/.env | tr -d ' ')
          PAYLOAD=$(jq -nc \
            --arg sha "${{ github.sha }}" \
            --arg msg "$COMMIT_MSG" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson run_id ${{ github.run_id }} \
            '{
              commit_sha: $sha,
              commit_message: ($msg | split("\n") | first | .[0:200]),
              branch: $branch,
              actor: $actor,
              status: "rolled_back",
              health_check: false,
              rollback: true,
              run_id: $run_id,
              run_url: $run_url
            }')
          curl -sf -X POST "${SITE_URL}/api/webhooks/github-deploy" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "⚠️ Dashboard webhook failed (non-critical)"

      # ── 14. Workflow als fehlgeschlagen markieren ─────────────
      - name: Fail workflow after rollback
        if: ${{ always() && (steps.healthcheck.outcome == 'failure' || steps.smoketest.outcome == 'failure') }}
        run: exit 1

      # ── 15. Log successful deploy to dashboard ──────────────
      - name: Log deploy success to dashboard
        if: steps.healthcheck.outcome == 'success' && steps.smoketest.outcome == 'success'
        continue-on-error: true
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          CRON_SECRET=$(grep -oP '^CRON_SECRET=\K.*' .next/standalone/.env | tr -d ' ')
          SITE_URL=$(grep -oP '^NEXT_PUBLIC_SITE_URL=\K.*' .next/standalone/.env | tr -d ' ')
          PAYLOAD=$(jq -nc \
            --arg sha "${{ github.sha }}" \
            --arg msg "$COMMIT_MSG" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg run_url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson run_id ${{ github.run_id }} \
            --argjson elapsed ${SECONDS:-0} \
            '{
              commit_sha: $sha,
              commit_message: ($msg | split("\n") | first | .[0:200]),
              branch: $branch,
              actor: $actor,
              status: "success",
              health_check: true,
              rollback: false,
              duration_s: $elapsed,
              run_id: $run_id,
              run_url: $run_url
            }')
          curl -sf -X POST "${SITE_URL}/api/webhooks/github-deploy" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "⚠️ Dashboard webhook failed (non-critical)"
