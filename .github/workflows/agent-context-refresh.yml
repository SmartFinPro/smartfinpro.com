name: Agent Context Refresh

on:
  # Daily at 03:00 UTC (keeps memory/generated/ in sync with codebase drift)
  schedule:
    - cron: '0 3 * * *'

  # After every merge to main
  push:
    branches:
      - main
      - master

  # Manual trigger (e.g. after bulk route additions)
  workflow_dispatch:

jobs:
  refresh:
    name: Refresh agent-context indexes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a token that can push commits back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run refresh:agent-context
        run: npm run refresh:agent-context

      - name: Check for changes in memory/generated/
        id: diff
        run: |
          git diff --quiet memory/generated/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated indexes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add memory/generated/
          git commit -m "chore: refresh agent-context indexes [skip ci]

          Auto-updated by agent-context-refresh workflow.
          Re-run: npm run refresh:agent-context"
          git push
