name: 📊 Claude — Report & Analyse

on:
  # Manuell auslösen (iPhone/iPad/Browser)
  workflow_dispatch:
    inputs:
      report_type:
        description: "Report-Typ"
        required: true
        type: choice
        options:
          - weekly-performance      # Top Reviews, Revenue, Rankings
          - content-audit           # Fehlende Frontmatter, Broken Links
          - competitor-snapshot     # SERP-Positionen vs. Konkurrenten
          - affiliate-audit         # Fehlende/inaktive Affiliate-Links
          - seo-health-check        # Hreflang, Schema, Meta-Tags
          - custom                  # Eigener Prompt unten
        default: weekly-performance
      custom_prompt:
        description: "Eigener Prompt (nur wenn 'custom' gewählt)"
        required: false
        type: string
      notify_email:
        description: "Report per E-Mail an info@smartfinpro.com senden?"
        required: false
        type: boolean
        default: true

  # Automatisch jeden Montag 7:00 Uhr (Weekly Report)
  schedule:
    - cron: "0 7 * * 1"

jobs:
  claude-report:
    name: Report via Claude Code
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Report-Typ bestimmen
        id: report
        run: |
          REPORT_TYPE="${{ github.event.inputs.report_type || 'weekly-performance' }}"
          CUSTOM="${{ github.event.inputs.custom_prompt }}"

          case "$REPORT_TYPE" in
            weekly-performance)
              PROMPT="Erstelle einen vollständigen Weekly Performance Report für SmartFinPro.com:
              1. Top 10 Reviews nach Pageviews (letzte 7 Tage) aus analytics Tabelle
              2. Revenue diese Woche vs. letzte Woche (revenue Tabelle)
              3. Neue Keywords unter Top 20 (keyword_tracking Tabelle)
              4. Conversion Rate pro Markt (conversions Tabelle)
              5. Offene Probleme (cron_logs mit status=error)
              Formatiere als übersichtliche Zusammenfassung."
              ;;
            content-audit)
              PROMPT="Führe einen vollständigen Content-Audit durch:
              1. Prüfe alle MDX-Dateien in content/ auf fehlende Pflicht-Frontmatter-Felder (title, description, market, category, affiliate_link)
              2. Finde MDX-Dateien ohne ReviewSchema oder FaqSchema
              3. Liste alle /go/[slug] Links die nicht in affiliate_links Tabelle existieren
              4. Zähle Reviews pro Markt und Kategorie
              Ausgabe als strukturierte Liste."
              ;;
            competitor-snapshot)
              PROMPT="Erstelle einen Competitor Intelligence Snapshot:
              1. Lese aktuelle Daten aus competitors Tabelle (CPS Scores)
              2. Vergleiche unsere Rankings vs. Konkurrenten aus keyword_tracking
              3. Identifiziere Keywords wo Konkurrenten Top 3 sind, wir aber nicht
              4. Empfehle die 5 wichtigsten Content-Lücken die wir schließen sollten
              Formatiere als priorisierte To-Do Liste."
              ;;
            affiliate-audit)
              PROMPT="Prüfe alle Affiliate-Links auf SmartFinPro:
              1. Lese alle Einträge aus affiliate_links Tabelle
              2. Finde is_active=false Links die noch in MDX-Dateien referenziert werden
              3. Finde MDX-Dateien mit affiliate_link im Frontmatter aber keinem Eintrag in DB
              4. Liste Links ohne cpa_value (cpa_value=0 oder null)
              Ausgabe: Priorisierte Fix-Liste mit geschätztem Revenue-Impact."
              ;;
            seo-health-check)
              PROMPT="Führe einen SEO Health Check durch:
              1. Prüfe ob alle market/category Kombinationen hreflang-Tags haben (lib/hreflang.ts)
              2. Finde MDX-Reviews ohne AggregateRating Schema
              3. Prüfe ob alle 4 Märkte in sitemap.ts korrekt registriert sind
              4. Finde Seiten mit title länger als 60 Zeichen oder description länger als 160 Zeichen
              5. Prüfe FCA-Labels auf allen UK-Seiten, ASIC auf allen AU-Seiten
              Ausgabe: SEO-Score pro Bereich + Fix-Empfehlungen."
              ;;
            custom)
              PROMPT="$CUSTOM"
              ;;
          esac

          echo "prompt<<EOF" >> $GITHUB_OUTPUT
          echo "$PROMPT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Claude Code — Report generieren
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-sonnet-4-6
          mode: agent
          allowed_tools: "Bash,Read,Write,Glob,Grep,LS"
          direct_prompt: |
            Du bist Senior-Analyst für SmartFinPro.com.

            ${{ steps.report.outputs.prompt }}

            ABLAUF (strikt einhalten!):
            1. Hole ALLE Daten in EINEM Bash-Befehl per curl aus Supabase REST API:
               curl -s "$NEXT_PUBLIC_SUPABASE_URL/rest/v1/TABELLE?select=FELDER&limit=10&order=FELD.desc" \
                 -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
                 -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY"
            2. Schreibe den FERTIGEN Report mit dem Write-Tool in die Datei report-output.md
               Das ist PFLICHT — ohne diese Datei wird keine E-Mail gesendet!
            3. Antworte auf Deutsch, maximal 500 Wörter
            4. KEINE Dateien im Repo ändern, KEIN git commit
          max_turns: 15
          claude_env: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Report per E-Mail senden
        if: ${{ github.event.inputs.notify_email != 'false' }}
        run: |
          DATE=$(date +"%d.%m.%Y %H:%M UTC")
          REPORT_TYPE="${{ github.event.inputs.report_type || 'weekly-performance' }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Report aus Datei lesen (von Claude geschrieben)
          if [ -f report-output.md ]; then
            REPORT_MD=$(cat report-output.md)
          else
            REPORT_MD="Report-Datei nicht gefunden. Details im [GitHub Log]($RUN_URL)."
          fi

          # Markdown → HTML (einfache Konvertierung)
          REPORT_HTML=$(echo "$REPORT_MD" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' | sed 's/^### \(.*\)/<h3>\1<\/h3>/; s/^## \(.*\)/<h2>\1<\/h2>/; s/^# \(.*\)/<h1>\1<\/h1>/' | sed 's/\*\*\([^*]*\)\*\*/<strong>\1<\/strong>/g' | sed '/^$/s/$/\n<br>/' | tr '\n' ' ')

          # JSON-safe escapen via python
          BODY_JSON=$(python3 -c "
          import json, sys
          report = open('report-output.md').read() if __import__('os').path.exists('report-output.md') else 'Report nicht verfügbar.'
          html_body = f\"\"\"<div style='font-family:sans-serif;max-width:700px;margin:0 auto'>
          <div style='background:linear-gradient(90deg,#1B4F8C,#F5A623);height:4px;border-radius:2px'></div>
          <h1 style='color:#1B4F8C;margin-top:24px'>📊 SmartFinPro Report</h1>
          <p style='color:#555'>Typ: $REPORT_TYPE | $DATE</p>
          <p style='color:#555;font-size:13px'><a href='$RUN_URL'>GitHub Log ansehen</a></p>
          <hr style='border:none;border-top:1px solid #eee;margin:20px 0'>
          <pre style='font-size:14px;line-height:1.7;color:#1A1A2E;white-space:pre-wrap;font-family:sans-serif'>{report}</pre>
          <hr style='border:none;border-top:1px solid #eee;margin:20px 0'>
          <p style='color:#888;font-size:12px'>SmartFinPro Report — automatisch generiert via Claude Code</p>
          </div>\"\"\"
          print(json.dumps({
            'from': 'SmartFinPro Reports <onboarding@resend.dev>',
            'to': ['christian33nrw@gmail.com'],
            'subject': f'📊 $REPORT_TYPE Report — $DATE',
            'html': html_body
          }))
          ")

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$BODY_JSON")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Resend Response: HTTP $HTTP_CODE — $BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "📧 Report an info@smartfinpro.com gesendet"
          else
            echo "❌ E-Mail-Versand fehlgeschlagen: HTTP $HTTP_CODE"
            exit 1
          fi
