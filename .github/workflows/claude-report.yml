name: 📊 Claude — Report & Analyse

on:
  # Manuell auslösen (iPhone/iPad/Browser)
  workflow_dispatch:
    inputs:
      report_type:
        description: "Report-Typ"
        required: true
        type: choice
        options:
          - weekly-performance      # Top Reviews, Revenue, Rankings
          - content-audit           # Fehlende Frontmatter, Broken Links
          - competitor-snapshot     # SERP-Positionen vs. Konkurrenten
          - affiliate-audit         # Fehlende/inaktive Affiliate-Links
          - seo-health-check        # Hreflang, Schema, Meta-Tags
          - custom                  # Eigener Prompt unten
        default: weekly-performance
      custom_prompt:
        description: "Eigener Prompt (nur wenn 'custom' gewählt)"
        required: false
        type: string
      notify_email:
        description: "Report per E-Mail an info@smartfinpro.com senden?"
        required: false
        type: boolean
        default: true

  # Automatisch jeden Montag 7:00 Uhr (Weekly Report)
  schedule:
    - cron: "0 7 * * 1"

jobs:
  claude-report:
    name: Report via Claude Code
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Report-Typ bestimmen
        id: report
        run: |
          REPORT_TYPE="${{ github.event.inputs.report_type || 'weekly-performance' }}"
          CUSTOM="${{ github.event.inputs.custom_prompt }}"

          case "$REPORT_TYPE" in
            weekly-performance)
              PROMPT="Erstelle einen vollständigen Weekly Performance Report für SmartFinPro.com:
              1. Top 10 Reviews nach Pageviews (letzte 7 Tage) aus analytics Tabelle
              2. Revenue diese Woche vs. letzte Woche (revenue Tabelle)
              3. Neue Keywords unter Top 20 (keyword_tracking Tabelle)
              4. Conversion Rate pro Markt (conversions Tabelle)
              5. Offene Probleme (cron_logs mit status=error)
              Formatiere als übersichtliche Zusammenfassung."
              ;;
            content-audit)
              PROMPT="Führe einen vollständigen Content-Audit durch:
              1. Prüfe alle MDX-Dateien in content/ auf fehlende Pflicht-Frontmatter-Felder (title, description, market, category, affiliate_link)
              2. Finde MDX-Dateien ohne ReviewSchema oder FaqSchema
              3. Liste alle /go/[slug] Links die nicht in affiliate_links Tabelle existieren
              4. Zähle Reviews pro Markt und Kategorie
              Ausgabe als strukturierte Liste."
              ;;
            competitor-snapshot)
              PROMPT="Erstelle einen Competitor Intelligence Snapshot:
              1. Lese aktuelle Daten aus competitors Tabelle (CPS Scores)
              2. Vergleiche unsere Rankings vs. Konkurrenten aus keyword_tracking
              3. Identifiziere Keywords wo Konkurrenten Top 3 sind, wir aber nicht
              4. Empfehle die 5 wichtigsten Content-Lücken die wir schließen sollten
              Formatiere als priorisierte To-Do Liste."
              ;;
            affiliate-audit)
              PROMPT="Prüfe alle Affiliate-Links auf SmartFinPro:
              1. Lese alle Einträge aus affiliate_links Tabelle
              2. Finde is_active=false Links die noch in MDX-Dateien referenziert werden
              3. Finde MDX-Dateien mit affiliate_link im Frontmatter aber keinem Eintrag in DB
              4. Liste Links ohne cpa_value (cpa_value=0 oder null)
              Ausgabe: Priorisierte Fix-Liste mit geschätztem Revenue-Impact."
              ;;
            seo-health-check)
              PROMPT="Führe einen SEO Health Check durch:
              1. Prüfe ob alle market/category Kombinationen hreflang-Tags haben (lib/hreflang.ts)
              2. Finde MDX-Reviews ohne AggregateRating Schema
              3. Prüfe ob alle 4 Märkte in sitemap.ts korrekt registriert sind
              4. Finde Seiten mit title länger als 60 Zeichen oder description länger als 160 Zeichen
              5. Prüfe FCA-Labels auf allen UK-Seiten, ASIC auf allen AU-Seiten
              Ausgabe: SEO-Score pro Bereich + Fix-Empfehlungen."
              ;;
            custom)
              PROMPT="$CUSTOM"
              ;;
          esac

          echo "prompt<<EOF" >> $GITHUB_OUTPUT
          echo "$PROMPT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Claude Code — Report generieren
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-sonnet-4-6
          mode: agent
          allowed_tools: "Bash,Read,Write,Glob,Grep,LS"
          direct_prompt: |
            Du bist Senior-Analyst für SmartFinPro.com.

            ${{ steps.report.outputs.prompt }}

            ABLAUF (strikt einhalten!):
            1. Hole ALLE Daten in EINEM Bash-Befehl per curl aus Supabase REST API:
               curl -s "$NEXT_PUBLIC_SUPABASE_URL/rest/v1/TABELLE?select=FELDER&limit=10&order=FELD.desc" \
                 -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
                 -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY"
            2. Schreibe den FERTIGEN Report mit dem Write-Tool in die Datei report-output.md
               Das ist PFLICHT — ohne diese Datei wird keine E-Mail gesendet!
            3. Antworte auf Deutsch, maximal 500 Wörter
            4. KEINE Dateien im Repo ändern, KEIN git commit
          max_turns: 15
          claude_env: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Report per E-Mail senden
        if: ${{ github.event.inputs.notify_email != 'false' }}
        env:
          REPORT_TYPE: ${{ github.event.inputs.report_type || 'weekly-performance' }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          export DATE_STR=$(date +"%d.%m.%Y %H:%M UTC")

          python3 << 'PYEOF'
          import json, re, os, urllib.request

          report_type = os.environ.get("REPORT_TYPE", "weekly-performance")
          date_str = os.environ.get("DATE_STR", "")
          run_url = os.environ.get("RUN_URL", "")
          resend_key = os.environ.get("RESEND_API_KEY", "")

          md = open('report-output.md').read() if os.path.exists('report-output.md') else 'Report nicht verfügbar.'

          # ── Markdown → styled HTML ──
          lines = md.split('\n')
          html_lines = []
          in_table = False
          table_row = 0

          for line in lines:
              s = line.strip()

              # Tables
              if '|' in s and s.startswith('|'):
                  cells = [c.strip() for c in s.split('|')[1:-1]]
                  if all(set(c) <= set('- :') for c in cells):
                      continue
                  if not in_table:
                      in_table = True
                      table_row = 0
                      html_lines.append('<table style="width:100%;border-collapse:collapse;margin:16px 0;font-size:13px;border-radius:8px;overflow:hidden">')
                  tag = 'th' if table_row == 0 else 'td'
                  if table_row == 0:
                      bg = 'background:#1B4F8C;color:white;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;'
                  else:
                      bg = f'background:{"#F8FAFC" if table_row % 2 == 0 else "white"};'
                  row_html = '<tr>' + ''.join(
                      f'<{tag} style="padding:10px 14px;text-align:left;border-bottom:1px solid #E8F0FB;{bg}">{c}</{tag}>'
                      for c in cells
                  ) + '</tr>'
                  html_lines.append(row_html)
                  table_row += 1
                  continue
              elif in_table:
                  in_table = False
                  html_lines.append('</table>')

              # Headers
              if s.startswith('# '):
                  html_lines.append(f'<h1 style="color:#1B4F8C;font-size:20px;margin:28px 0 12px;border-bottom:3px solid #F5A623;padding-bottom:8px">{s[2:]}</h1>')
              elif s.startswith('## '):
                  num = re.match(r'(\d+\.)', s[3:])
                  badge = f'<span style="display:inline-block;background:#F5A623;color:white;border-radius:50%;width:24px;height:24px;text-align:center;line-height:24px;font-size:13px;font-weight:700;margin-right:8px">{num.group(1)[:-1]}</span>' if num else ''
                  title = re.sub(r'^\d+\.\s*', '', s[3:])
                  html_lines.append(f'<h2 style="color:#1B4F8C;font-size:17px;margin:28px 0 10px;padding:12px 16px;background:#E8F0FB;border-radius:8px;border-left:4px solid #1B4F8C">{badge}{title}</h2>')
              elif s.startswith('### '):
                  html_lines.append(f'<h3 style="color:#1A1A2E;font-size:15px;margin:16px 0 8px">{s[4:]}</h3>')
              # Blockquotes (warnings/info)
              elif s.startswith('> '):
                  text = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', s[2:])
                  is_warn = any(w in text for w in ['Hinweis', 'Action', 'Keine Daten', 'prüfen', 'fehlt'])
                  bg = '#FFF8E7' if is_warn else '#E8F0FB'
                  border = '#F5A623' if is_warn else '#1B4F8C'
                  icon = '⚠️' if is_warn else 'ℹ️'
                  html_lines.append(f'<div style="border-left:4px solid {border};background:{bg};padding:12px 16px;margin:12px 0;border-radius:0 8px 8px 0;font-size:13px;color:#1A1A2E">{icon} {text}</div>')
              elif s.startswith('---'):
                  pass  # skip, sections handle their own spacing
              elif s == '':
                  pass
              else:
                  text = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', s)
                  text = re.sub(r'`(.+?)`', r'<code style="background:#E8F0FB;padding:2px 6px;border-radius:4px;font-size:12px;color:#1B4F8C">\1</code>', text)
                  # Status badges
                  text = text.replace('✅', '<span style="color:#1A6B3A">✅</span>')
                  text = text.replace('❌', '<span style="color:#D64045">❌</span>')
                  text = text.replace('🔴', '<span style="display:inline-block;width:10px;height:10px;background:#D64045;border-radius:50%;margin-right:6px"></span>')
                  text = text.replace('🟡', '<span style="display:inline-block;width:10px;height:10px;background:#F5A623;border-radius:50%;margin-right:6px"></span>')
                  text = text.replace('🟢', '<span style="display:inline-block;width:10px;height:10px;background:#1A6B3A;border-radius:50%;margin-right:6px"></span>')
                  html_lines.append(f'<p style="font-size:14px;line-height:1.7;color:#1A1A2E;margin:5px 0">{text}</p>')

          if in_table:
              html_lines.append('</table>')

          body_content = '\n'.join(html_lines)
          rt_title = report_type.replace('-', ' ').title()

          html = f"""<!DOCTYPE html><html><head><meta charset="utf-8"></head>
          <body style="margin:0;padding:0;background:#F2F4F8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
          <div style="max-width:680px;margin:20px auto;background:white;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(27,79,140,0.1)">
            <div style="background:linear-gradient(135deg,#1B4F8C 0%,#163D6E 100%);padding:36px 40px 32px">
              <table style="width:100%"><tr>
                <td><h1 style="margin:0;color:white;font-size:26px;font-weight:700">📊 SmartFinPro</h1></td>
                <td style="text-align:right"><span style="background:rgba(245,166,35,0.2);color:#F5A623;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600">LIVE DATA</span></td>
              </tr></table>
              <p style="margin:10px 0 0;color:#F5A623;font-size:18px;font-weight:600">{rt_title} Report</p>
              <p style="margin:6px 0 0;color:rgba(255,255,255,0.6);font-size:13px">{date_str}</p>
            </div>
            <div style="padding:32px 40px">{body_content}</div>
            <div style="background:#F8FAFC;padding:20px 40px;border-top:1px solid #E8F0FB">
              <table style="width:100%"><tr>
                <td><a href="{run_url}" style="color:#1B4F8C;text-decoration:none;font-size:12px">GitHub Log →</a></td>
                <td style="text-align:right;font-size:11px;color:#888">SmartFinPro.com · Claude Code</td>
              </tr></table>
            </div>
          </div></body></html>"""

          payload = json.dumps({
              'from': 'SmartFinPro Reports <onboarding@resend.dev>',
              'to': ['christian33nrw@gmail.com'],
              'subject': f'\U0001f4ca {rt_title} Report \u2014 {date_str}',
              'html': html
          }).encode()

          req = urllib.request.Request('https://api.resend.com/emails',
              data=payload,
              headers={'Authorization': f'Bearer {resend_key}', 'Content-Type': 'application/json'})
          try:
              resp = urllib.request.urlopen(req)
              print(f"📧 Report gesendet — HTTP {resp.status}")
          except urllib.error.HTTPError as e:
              print(f"❌ Fehler: HTTP {e.code} — {e.read().decode()}")
              raise SystemExit(1)
          PYEOF
